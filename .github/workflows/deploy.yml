name: Deploy Firebase Functions

# Vercel frontend được deploy tự động qua Vercel GitHub Integration
# (connect repo trực tiếp tại vercel.com — không cần workflow)

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

jobs:
  # Deploy Firebase Functions
  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/functions/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install dependencies
        working-directory: apps/functions
        run: npm install

      - name: Deploy to Firebase
        working-directory: apps/functions
        run: firebase deploy --only functions --project marketing-stalker-tool --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
