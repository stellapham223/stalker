<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6a00" stop-opacity="1"/>
      <stop offset="60%" stop-color="#ff3300" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#0a0e1a"/>

  <!-- Body / coat -->
  <path d="M7 32 C7 24 9 20 11 18 L14 17 L18 17 L21 18 C23 20 25 24 25 32Z" fill="#d0d8e8"/>

  <!-- Neck -->
  <rect x="14" y="14" width="4" height="4" rx="1" fill="#c8d0e0"/>

  <!-- Head -->
  <ellipse cx="16" cy="12" rx="5" ry="5.5" fill="#d0d8e8"/>

  <!-- Fedora brim -->
  <ellipse cx="16" cy="7.5" rx="8" ry="1.8" fill="#b0bac8"/>

  <!-- Fedora crown -->
  <path d="M10 7.5 C10 3.5 12 2 16 2 C20 2 22 3.5 22 7.5Z" fill="#c8d2e0"/>
  <!-- Crown indent -->
  <path d="M13 7.5 C13 5 14.5 3.5 16 3.5 C17.5 3.5 19 5 19 7.5Z" fill="#b0bac8"/>

  <!-- Shadow over upper face (hat shadow) -->
  <ellipse cx="16" cy="9" rx="4.5" ry="2" fill="#0a0e1a" opacity="0.55"/>

  <!-- Eyes glow halos -->
  <circle cx="13.5" cy="10.5" r="2.2" fill="url(#eyeGlow)" filter="url(#softGlow)" opacity="0.9"/>
  <circle cx="18.5" cy="10.5" r="2.2" fill="url(#eyeGlow)" filter="url(#softGlow)" opacity="0.9"/>

  <!-- Eyes -->
  <circle cx="13.5" cy="10.5" r="1.1" fill="#ff6a00" filter="url(#glow)"/>
  <circle cx="18.5" cy="10.5" r="1.1" fill="#ff6a00" filter="url(#glow)"/>

  <!-- Eye pupils (hot center) -->
  <circle cx="13.5" cy="10.5" r="0.5" fill="#ffe0a0"/>
  <circle cx="18.5" cy="10.5" r="0.5" fill="#ffe0a0"/>

  <!-- Collar / lapels -->
  <path d="M14 17 L12 22 L16 20 L20 22 L18 17Z" fill="#b8c2d0"/>

</svg>
